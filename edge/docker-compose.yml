# docker-compose.yml — Project Aegis edge stack (Greengrass V2 Core in Docker)
#
# Prerequisites (one-time setup — see scripts/provision-greengrass.sh):
#   1. Run `cdk deploy ProjectAegisGreengrassStack` to create IAM + IoT resources.
#   2. Run `scripts/provision-greengrass.sh` to create the core device cert and
#      generate edge/certs/ + edge/config/greengrass-config.yaml from the template.
#
# Start the edge stack:
#   docker-compose up -d
#
# Deploy the publisher component to the running nucleus:
#   scripts/deploy-component.sh
#
# Inject an anomaly scenario (e.g. FanFailure):
#   docker exec project-aegis-greengrass \
#     /greengrass/v2/bin/greengrass-cli deployment create \
#       --recipeDir /greengrass/local-recipes \
#       --artifactDir /greengrass/local-artifacts \
#       --merge "com.project-aegis.publisher=1.0.0" \
#       --update-config '{"com.project-aegis.publisher":{"MERGE":{"publishIntervalSeconds":"5"}}}'
#
# Network-out test (see docs/offline-test.md):
#   docker network disconnect project_aegis_edge_net project-aegis-greengrass
#   # wait 5 minutes, observe buffer filling
#   docker network connect project_aegis_edge_net project-aegis-greengrass
#   # observe drain to zero

version: "3.9"

services:
  greengrass:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project-aegis-greengrass
    image: project-aegis-greengrass:latest

    # Greengrass nucleus needs these for initial provisioning check
    environment:
      - AWS_DEFAULT_REGION=us-west-2
      # PROVISION=false — we supply pre-provisioned certs via volume mount
      - PROVISION=false
      # Tell the nucleus where to find the initial config
      - INIT_CONFIG=/tmp/config/greengrass-config.yaml

    volumes:
      # IoT certs (device.pem.crt, private.pem.key, AmazonRootCA1.pem)
      # Generated by scripts/provision-greengrass.sh — never commit these.
      - ./certs:/tmp/certs:ro

      # Nucleus initial config (generated from config/greengrass-config.yaml.template)
      - ./config/greengrass-config.yaml:/tmp/config/greengrass-config.yaml:ro

      # Persistent nucleus state (credentials, component store, work dirs)
      - greengrass_data:/greengrass/v2

      # Component artifacts — writable so deploy-component.sh can create the versioned
      # subdirectory structure and docker cp files in (local development workflow).
      - ./artifacts:/greengrass/local-artifacts

      # Component recipes — writable so deploy-component.sh can docker cp recipe.yaml in.
      - ./recipes:/greengrass/local-recipes

    # Greengrass needs elevated privileges to manage network namespaces and
    # run containerised component processes.
    privileged: true

    restart: unless-stopped

    networks:
      - edge_net

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

networks:
  edge_net:
    name: project_aegis_edge_net
    driver: bridge

volumes:
  greengrass_data:
    name: project-aegis-greengrass-data
